name: Update dive profile graphics

on:
  push:
    branches:
      - main
    paths:
      - "figures/results/**/*.csv"
      - "scripts/generate_dive_profile_graphics.py"
      - "scripts/generate_flash_profile_diff_figure.py"
      - ".github/workflows/update-dive-profile-graphics.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render-graphics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install plotting dependency
        run: python -m pip install --upgrade pip matplotlib

      - name: Render dive profile graphics
        run: python scripts/generate_dive_profile_graphics.py

      - name: Render flash profile diff figures
        run: python scripts/generate_flash_profile_diff_figure.py

      - name: Commit updated graphics
        run: |
          git add figures/results/*.pdf

          if git diff --cached --quiet -- figures/results/*.pdf; then
            echo "No graphics changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          TRIGGER_SHA=$(git rev-parse --short HEAD)
          TRIGGER_MSG=$(git log -1 --format='%s')
          git commit -m "Update dive profile graphics (${TRIGGER_SHA}: ${TRIGGER_MSG})"
          git pull --rebase && git push
